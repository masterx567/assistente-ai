services:
  - type: worker
    name: assistente-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: NOTION_TOKEN
        sync: false
      - key: NOTION_DB_TRANSACTIONS
        sync: false
      - key: NOTION_DB_CATEGORIES
        sync: false
